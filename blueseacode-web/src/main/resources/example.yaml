server:
  port: 8080

spring:
  application:
    name: blueseacode-platform

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blueseacode?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_database_password    # ⚠️ 替换为你自己的密码
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        prefetch: 1
        concurrency: 3
        max-concurrency: 10
        retry:
          enabled: true
          max-attempts: 3

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.blueseacode.dao.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: org.blueseacode.web.controller

logging:
  level:
    org.blueseacode: DEBUG
    com.baomidou: DEBUG

# ===== 阿里云OSS配置（请替换为你的配置） =====
oss:
  endpoint: oss-cn-shenzhen.aliyuncs.com
  access-key-id: your_oss_access_key_id
  access-key-secret: your_oss_access_key_secret
  bucket-name: your_bucket_name

# ===== JWT 配置 =====
jwt:
  secret: your_jwt_secret_key
  access-token-expire: 86400000
  refresh-token-expire: 2592000000

# ===== 火山引擎豆包大模型配置 =====
volc-engine:
  api-key: your_api_key       # mock=开发模式 / 真实key=调用API
  base-url: https://ark.cn-beijing.volces.com/api/v3/
  model: doubao-1-5-lite-32k-250115
  max-tokens: 2048
  temperature: 0.7